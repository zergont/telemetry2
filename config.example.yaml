# ============================================================
# Универсальный Modbus-декодер — Конфигурация
# ============================================================
# Скопируйте этот файл в config.yaml и измените параметры под себя.
# ============================================================

# ------------------------------------------------------------
# Настройки MQTT-брокера
# ------------------------------------------------------------
mqtt:
  # Хостнейм или IP-адрес брокера
  host: "localhost"
  
  # Порт брокера (обычно 1883 для TCP, 8883 для TLS)
  port: 1883
  
  # Client ID (должен быть уникальным для каждого подключения)
  client_id: "modbus-decoder"
  
  # Аутентификация (оставьте пустым, если не требуется)
  username: ""
  password: ""
  
  # Настройки переподключения
  reconnect_delay_sec: 5
  
  # Шаблоны топиков
  # Подписка на RAW телеметрию (+ — wildcard для SN роутера)
  raw_topic_pattern: "cg/v1/telemetry/SN/+"
  
  # Базовый топик для публикации декодированных данных
  decoded_topic_base: "cg/v1/decoded/SN"

# ------------------------------------------------------------
# Настройки Web UI
# ------------------------------------------------------------
web:
  # Хост для bind (0.0.0.0 — все интерфейсы)
  host: "0.0.0.0"
  
  # Порт веб-интерфейса
  port: 8080
  
  # Включить debug-режим (auto-reload, подробные ошибки)
  debug: false

# ------------------------------------------------------------
# Настройки монитора состояния
# ------------------------------------------------------------
health:
  # Секунд без сообщений до статуса "stale"
  stale_threshold_sec: 10
  
  # Секунд без сообщений до статуса "offline"
  offline_threshold_sec: 60
  
  # Интервал проверки состояния
  check_interval_sec: 5

# ------------------------------------------------------------
# Карты регистров
# ------------------------------------------------------------
maps:
  # Путь к файлу карты регистров (формат JSONL)
  register_map: "maps/register_map.jsonl"
  
  # Путь к enum-определениям (формат JSON)
  enum_map: "maps/enum_map.json"
  
  # Путь к определениям fault bitmap (формат JSONL)
  fault_bitmap_map: "maps/fault_bitmap_map.jsonl"

# ------------------------------------------------------------
# Настройки логирования
# ------------------------------------------------------------
logging:
  # Уровень логирования: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  
  # Лог в файл (пусто = только консоль)
  file: ""
  
  # Формат логов
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

# ------------------------------------------------------------
# Режим работы
# ------------------------------------------------------------
# debug: подробные логи, raw вход/выход, причины ошибок декодирования
# production: минимальное логирование
mode: "production"
